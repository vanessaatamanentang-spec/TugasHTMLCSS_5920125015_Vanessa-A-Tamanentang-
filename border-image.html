<!DOCTYPE html>
<html>
    <head>
        <style type="text/css">
            p.one {
                -moz-border-image: url("images/dots.gif")
                11 11 11 11 stretch;
                -webkit-border-image: url("image/dots.gif")
                11 11 11 11 stretch;
                border-image: url("images/dots.gif")
                11 11 11 11 stretch;}
            p.two {
                -moz-border-image: url("images/dots.gif")
                11 11 11 11 round;
                -webkit-border-image: url("images/dots.gif")
                11 11 11 11 round;
                border-image: url("images/dots.gif")
                11 11 11 11 round;}
        </style>
    </head>
    <body>
        <p class="one"><img src="s4.png" alt="s4"></p>
        <p class="two"><img src="s5.png" alt="s5"></p>
        <p class="three"></p>
    </body>
</html>
