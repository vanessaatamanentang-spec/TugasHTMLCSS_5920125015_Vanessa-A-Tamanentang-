<!DOCTYPE html>
<html>
    <head>
        <style type="text/css">
            p.one {
                -moz-box-shadow: -5px -5px #2bf321;
                -webkit-box-shadow: -5px -5px #89c620;
                box-shadow: -5px -5px #a743ff;}
            p.two {
                -moz-box-shadow: 5px 5px 5px #22b118;
                -webkit-box-shadow: 5px 5px 5px #f4acc3;
                box-shadow: 5px 5px 5px #bdd9e7;}
            p.three {
                -moz-box-shadow: 5px 5px 5px 5px #e7aeae;
                -webkit-box-shadow: 5px 5px 5px 5px #bf4747;
                box-shadow: 5px 5px 5px 5px #0db123;}
            p.four {
                -moz-box-shadow: 0 0 10px #777777;
                -webkit-box-shadow: 0 0 10px #b8e9b5;
                box-shadow: 0 0 10px #4bba13;}
            p.five {
                -moz-box-shadow: 0 0 10px #2ebd1b;
                -webkit-box-shadow: 0 0 10px #221b1b;
                 box-shadow: 0 0 10px #f7f3f3;}
        </style>
    </head>
    <body>
        <p class="one"></p>
        <p class="two"></p>
        <p class="three"></p>
        <p class="four"></p>
        <p class="five"></p>
    </body>
</html>
