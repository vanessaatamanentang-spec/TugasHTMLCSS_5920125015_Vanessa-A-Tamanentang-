<!DOCTYPE html>
<html>
    <head>
        <style type="text/css">
            img.large {
                width: 500px;
                height: 500px;}
            img.medium {
                width: 250px;
                height: 250px;}
            img.small {
                width: 100px;
                height: 100px;}
        </style>
    </head>
    <body>
        <img src="bunga.png" 
            class="large" alt="bunga" />
        <img src="bunga.png" 
            class="medium" alt="bunga" />
        <img src="bunga.png" 
            class="small" alt="bunga" />
    </body>
</html>
