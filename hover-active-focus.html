<!DOCTYPE html>
<html>
    <head>
        <style type="text/css">
        input {
                padding: 6px 12px 6px 12px;
                border: 1px solid #b8712b;
                color: #483888;}
        input.submit:hover {
            background-color: #0f0f0f;}
        input.submit:active {
            background-color: rgb(94, 143, 64);}
        input.text {
            color: #de5353;}
        input.text:focus {
            color: #4e16cf;}
        </style>
    </head>
    <body>
        <form action="http://www.example.org/profile.php">
            <input type="url" name="website" />
            <input type="submit" value="Submit" />
        </form>
    </body>
</html>
